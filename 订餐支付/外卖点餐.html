<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>外卖点餐</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <!-- 左边：公司 Logo -->
    <div class="logo">
        <img src="/images/Logo 100x40.jpg" alt="公司Logo">
    </div>
    
    <nav>
      <a href="/index.html">首页</a>
      <a href="/活动通知/index.html">活动通知</a>
      <a href="/产品介绍/index.html">产品介绍</a>
    </nav>
  </header>

  <main>
    <h1>外卖点餐</h1>
    <!-- Product List-->
    <div class="products">
        <h2 style="color: blue;">产品列表</h2>
        <div class="Product">
            <h4>面包</h4>
            <img src="/images/Bread - 77x49.jpg" alt="面包">
            <p>价格: ￥5</p>
            <button onclick="addToCart('面包', 5)">选购</button>
        </div>
        <div class="Product">
            <h4>豆浆</h4>
            <img src="/images/soy_milk 77x112.jpg" alt="豆浆">
            <p>价格: ￥2.5</p>
            <button onclick="addToCart('豆浆', 2.5)">选购</button>
        </div>
        <div class="Product">
            <h4>卤蛋</h4>
            <img src="/images/egg 77x59.jpg" alt="卤蛋">
            <p>价格: ￥2.5</p>
            <button onclick="addToCart('卤蛋', 2.5)">选购</button>
        </div>
        <div class="Product">
            <h4>打包费</h4>
            <img src="/images/package 70x70.jpg" alt="包装盒/袋">
            <p>价格: ￥1</p>
            <button onclick="addToCart('打包费', 1)">外卖必选</button>
        </div>
        <div class="Product">
            <h4>运费</h4>
            <img src="/images/deliver 70x70.jpg" alt="跑腿">
            <p>价格: ￥3</p>
            <button onclick="addToCart('运费', 3)">外卖必选</button>
        </div>
    </div>
    <!-- Shopping Cart -->
    <div class="cart">
      <h2 style="color: blue;">购物车</h2>
      <table>
          <thead>
              <tr>
                  <th>序号</th>
                  <th>品名</th>
                  <th>价格</th>
                  <th>数量</th>
                  <th>金额</th>
                  <th>移除</th>
              </tr>
          </thead>
          <tbody id="cart-items"></tbody>
      </table>
      <p class="cart-total"><strong>总价:￥<span id="cart-total">0</span></strong></p><br>
    </div>
    <div>
      <h2 style="color: blue;">支付方式：</h2>
      <button type="button" onclick="goToPayment('wechat')">微信支付</button>
      <button type="button" onclick="goToPayment('alipay')">支付宝支付</button>
    </div>
  </main>

  <footer>
    <p>公司名称：深圳市XX餐饮有限公司</p>
    <p>联系电话：0755-XXXXXXXX</p>
    <p>联系地址：深圳市XX区XX路XX号</p>
  </footer>
  <script src="/js/Cart-out.js"></script>
  
</body>
</html>
